# Docs for the Azure Functions Deploy action: https://github.com/Azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Functions - pa4-27100420-fn

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: pa427100420.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_3BE6232C13FF412EB178A9AED3FD5A5E }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_CA1E8EEBF8034583A42E38E9043A1ABB }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: pa427100420.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_3BE6232C13FF412EB178A9AED3FD5A5E }}/func-app:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ABF47CFCC1C04EA7AFCCC1935951D74F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B7C4595678DB4DFDA00E2B58A547947C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A078B7F791384C63B5C649E699D84893 }}

      - name: Deploy to Azure Functions
        id: deploy-to-functions
        uses: azure/functions-deploy@v2
        with:
          app-name: 'pa4-27100420-fn'
          slot-name: 'Production'
          images: 'pa427100420.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_3BE6232C13FF412EB178A9AED3FD5A5E }}/func-app:${{ github.sha }}'
          